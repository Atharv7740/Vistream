name: Deploy to EC2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Check EC2 connectivity
        run: |
          echo "Testing SSH connection to ${{ secrets.EC2_HOST }}"
          nc -zv -w 10 ${{ secrets.EC2_HOST }} 22 || echo "Port 22 not reachable"
          
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH configured"
          
      - name: Deploy to EC2
        shell: bash
        run: |
          set -euo pipefail
          
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=120 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o BatchMode=yes ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
          
          $SSH_CMD "echo 'SSH Connection Successful!'"
          
          $SSH_CMD << 'COMMANDS'
            set -euo pipefail
            
            # Install Docker if not present
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin git
              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            fi
            
            # Create app directory
            sudo mkdir -p /opt/Vistream
            sudo chown -R ubuntu:ubuntu /opt/Vistream
            
            # Clone or update repo
            cd /opt/Vistream
            if [ ! -d .git ]; then
              git clone https://github.com/Atharv7740/Vistream.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Create .env if not exists
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi
            
            # Build and start containers
            sudo docker compose down 2>/dev/null || true
            sudo docker compose build
            sudo docker compose up -d
            sudo docker system prune -f
            
            echo "Deployment complete!"
          COMMANDS