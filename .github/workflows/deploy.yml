name: Deploy to EC2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          for i in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            sleep 2
          done

          echo "SSH configured"
          
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "bash -lc 'set -euo pipefail
            APP_DIR=/opt/Vistream
            REPO_URL=https://github.com/Atharv7740/Vistream.git
            BRANCH=main

            # Install Docker + Compose plugin from Docker official APT repo
            if ! command -v docker >/dev/null 2>&1 || ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release

              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \"deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \$(. /etc/os-release && echo \$VERSION_CODENAME) stable\" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin git
              sudo systemctl enable --now docker
              sudo usermod -aG docker ubuntu
            fi

            sudo mkdir -p \"\$APP_DIR\"
            sudo chown -R ubuntu:ubuntu \"\$APP_DIR\"

            if [ ! -d \"\$APP_DIR/.git\" ]; then
              rm -rf \"\$APP_DIR\"/*
              git clone --branch \"\$BRANCH\" \"\$REPO_URL\" \"\$APP_DIR\"
            fi

            cd \"\$APP_DIR\"
            git fetch origin \"\$BRANCH\"
            git reset --hard \"origin/\$BRANCH\"

            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi

            sudo docker compose down 2>/dev/null || true
            sudo docker compose build --no-cache
            sudo docker compose up -d
            sudo docker system prune -f
            echo Deployment complete!
          '"