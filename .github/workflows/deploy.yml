name: Deploy to EC2

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
          
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
          
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          # Validate required secrets
          echo "Validating secrets..."
          echo "EC2_HOST: ${{ secrets.EC2_HOST }}"
          echo "EC2_USER: ${{ secrets.EC2_USER }}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key safely (preserve newlines)
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add host key with timeout + retries
          echo "Adding SSH host key..."
          for i in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed; retrying..." >&2
            sleep 2
          done

          # Verify known_hosts is populated
          if [ -s ~/.ssh/known_hosts ]; then
            echo "SSH configuration successful!"
          else
            echo "ERROR: known_hosts is empty after all attempts"
            exit 1
          fi
          
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /opt/Vistream
            git pull origin main
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d
            docker system prune -f
          EOF