version: '3.8'

services:
  backend:
    build:
      context: ./vistream-backend
      dockerfile: Dockerfile
    ports:
      - "3332:3332"
    env_file:
      - ./vistream-backend/.env
    volumes:
      - ./vistream-backend/videos:/app/videos
    restart: unless-stopped
    networks:
      - vistream-network

  frontend:
    build:
      context: ./vistream-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:3332/api
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vistream-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - vistream-network

networks:
  vistream-network:
    driver: bridge
